name: CI

on:
  push:         { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch:

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Install dependencies
        run: |
          npm install react@18.3.1 react-dom@18.3.1 --no-audit --no-fund
          npm install --save-dev vite@5.4.14 @vitejs/plugin-react@4.3.4 @types/react@18.3.1 @types/react-dom@18.3.1 typescript@5.4.5 --no-audit --no-fund
      - name: Build
        run: npx vite build
        env:
          VITE_API_URL: https://api.rald.cloud
