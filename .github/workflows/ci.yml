name: CI

on:
  push:        { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Upgrade npm
        run: npm install -g npm@latest --prefer-online
      - run: npm install
      - run: npm run build
