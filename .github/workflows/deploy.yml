name: Deploy to Cloudflare Pages

on:
  push:    { branches: [main] }
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy (rald-admin → admin.rald.cloud)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Install dependencies
        run: yarn install --non-interactive

      - name: Build
        run: yarn run build
        env:
          VITE_API_URL: https://api.rald.cloud

      - name: Deploy via wrangler
        run: |
          npx wrangler@3 pages deploy dist \
            --project-name=rald-admin \
            --branch=main \
            --commit-hash=${{ github.sha }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Audit log
        if: always()
        run: echo "AUDIT service=rald-admin commit=${{ github.sha }} actor=${{ github.actor }} ts=$(date -u +%Y-%m-%dT%H:%M:%SZ) status=${{ job.status }}"
